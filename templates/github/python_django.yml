# Metadata: version=1.0.0, platform=GitHub Actions, language=Python, framework=Django
name: {{ app_name }} CI/CD Pipeline

on:
  push:
    branches: [ {{ target_branch|default('main') }} ]
  pull_request:
    branches: [ {{ target_branch|default('main') }} ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python {{ python_version|default('3.12') }}
        uses: actions/setup-python@v5
        with:
          python-version: '{{ python_version|default("3.12") }}'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run Unit Tests
        run: python manage.py test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker Image
        run: docker build -t {{ app_name|lower }}:latest .
